<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Images/Mingle-Icon.png">
    <title>Test</title>

    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="auth-page">
<div class="blobs">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
</div>

<div class="auth-wrap">

    <!-- BRAND -->
    <div class="brand">
        <div>
            <img src="Images/Mingle-Icon.png" alt="Mingle Logo" class="brand-immage">
        </div>
        <span class="brand-name">Mingle</span>
    </div>

    <!-- CARD -->
    <div class="card">

        <!-- TABS -->
        <div class="tabs">
            <button class="tab active" data-tab="login">Sign in</button>
            <button class="tab" data-tab="signup">Create account</button>
        </div>

        <div id="auth-msg" class="msg"></div>

        <!-- LOGIN PANEL -->
        <div class="panel active" id="panel-login">

            <button class="btn-google" onclick="googleStub()">
                <svg width="17" height="17" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>

            <div class="divider"><span>or</span></div>

            <div class="field">
                <label for="li-id">Email or username</label>
                <input type="text" id="li-id" placeholder="you@example.com" autocomplete="username">
            </div>

            <div class="field">
                <label for="li-pw">Password</label>
                <input type="password" id="li-pw" placeholder="••••••••" autocomplete="current-password">
                <button type="button" class="toggle-pw" onclick="togglePw('li-pw')">
                    <svg viewBox="0 0 24 24" width="16" height="16">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>

            <a href="#" class="forgot" onclick="return false">Forgot password?</a>

            <button class="btn-primary" onclick="handleLogin()">Sign in</button>
        </div>

        <!-- SIGNUP PANEL -->
        <div class="panel" id="panel-signup">

            <button class="btn-google" onclick="googleStub()">
                <svg width="17" height="17" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Sign up with Google
            </button>

            <div class="divider"><span>or</span></div>

            <div class="field-row">
                <div class="field">
                    <label for="su-first">First name</label>
                    <input type="text" id="su-first" placeholder="Jane">
                </div>

                <div class="field">
                    <label for="su-last">Last name</label>
                    <input type="text" id="su-last" placeholder="Doe">
                </div>
            </div>

            <div class="field">
                <label for="su-user">Username</label>
                <input type="text" id="su-user" placeholder="janedoe" autocorrect="off" autocapitalize="off" spellcheck="false">
                <span class="hint">Letters, numbers, and underscores only</span>
            </div>

            <div class="field">
                <label for="su-email">Email</label>
                <input type="email" id="su-email" placeholder="jane@example.com">
            </div>

            <div class="field">
                <label for="su-pw">Password</label>
                <input type="password" id="su-pw" placeholder="At least 8 characters">
                <button type="button" class="toggle-pw" onclick="togglePw('su-pw')">
                    <svg viewBox="0 0 24 24" width="16" height="16">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
                <div class="pw-strength"><div class="pw-bar" id="pw-bar"></div></div>
            </div>

            <button class="btn-primary" onclick="handleSignup()">Create account</button>
        </div>

        <p class="terms">
            By continuing, you agree to our
            <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
        </p>
    </div>
</div>

<!-- LOAD AUTH LOGIC -->
<script type="module" src="auth.js"></script>

</body>
</html>
