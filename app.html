<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Images/Mingle-Icon.png">
    <title>Mingle</title>

    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="toast" id="toast"></div>

<!-- NAVIGATION -->
<nav class="nav">
    <span class="nav-brand">Mingle</span>

    <div class="nav-search">
        <span class="nav-search-icon">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="text" placeholder="Zoeken op Mingle…">
    </div>

    <div class="nav-actions">
        <button class="nav-icon-btn" onclick="toast('Geen meldingen nog!')">
            <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
        <div class="nav-avatar" id="nav-avatar" onclick="showView('profile')"></div>
    </div>
</nav>

<div class="app-body">
    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
        <button class="sidebar-link active" id="sl-home" onclick="showView('feed')">
            <img src="Icons/home-icon.png" class="icon">Home
        </button>

        <button class="sidebar-link" id="sl-profile" onclick="showView('profile')">
            <img src="Icons/profile-icon.png" class="icon">Profiel
        </button>

        <button class="sidebar-link" onclick="toast('Berichten komen er snel aan!')">
            <img src="Icons/chat-icon.png" class="icon">Berichten
        </button>

        <button class="sidebar-link" onclick="toast('Instellingen komen er snel aan!')">
            <img src="Icons/settings-icon.png" class="icon">Instellingen
        </button>

        <div class="sidebar-spacer"></div>

        <button class="sidebar-link danger" onclick="logout()">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Uitloggen
        </button>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">

        <!-- FEED VIEW -->
        <div class="view active" id="view-feed">

            <!-- CREATE ACTIVITY COMPOSE -->
            <div class="compose">
                <div class="compose-inner">
                    <div class="c-avatar" id="compose-av"></div>

                    <div class="compose-right">
                        <div class="compose-fields">
                            <!-- Row 1: Location + Date -->
                            <div class="compose-field-row">
                                <input
                                        type="text"
                                        id="compose-location"
                                        class="compose-input"
                                        placeholder="📍 Locatie (bijv. Eindhoven)"
                                        maxlength="80"
                                >
                                <input
                                        type="date"
                                        id="compose-date"
                                        class="compose-input"
                                >
                            </div>
                            <!-- Row 2: Category -->
                            <select id="compose-category" class="compose-input">
                                <option value="Bioscoop">🎬 Bioscoop</option>
                                <option value="Sport">⚽ Sport</option>
                                <option value="Wandelen">🥾 Wandelen</option>
                                <option value="Eten & Drinken">🍔 Eten &amp; Drinken</option>
                                <option value="Muziek">🎵 Muziek</option>
                                <option value="Gaming">🎮 Gaming</option>
                                <option value="Reizen">✈️ Reizen</option>
                                <option value="Overig">📌 Overig</option>
                            </select>
                            <!-- Row 3: Optional description -->
                            <input
                                    type="text"
                                    id="compose-description"
                                    class="compose-input"
                                    placeholder="Korte beschrijving (optioneel)"
                                    maxlength="140"
                            >
                        </div>
                        <div class="compose-footer">
                            <button class="btn-post" onclick="submitPost()">Plaatsen</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ACTIVITY FEED -->
            <div id="feed-list" style="display:flex;flex-direction:column;gap:1rem"></div>
        </div>

        <!-- PROFILE VIEW -->
        <div class="view" id="view-profile">
            <div class="profile-header">
                <div class="profile-cover"><div class="profile-cover-dots"></div></div>

                <div class="profile-info">
                    <div class="profile-av-wrap">
                        <div class="profile-av" id="p-av"></div>
                    </div>

                    <div class="profile-name" id="p-name"></div>
                    <div class="profile-handle" id="p-handle"></div>

                    <div class="profile-bio">Hey there! I just joined Mingle 👋</div>

                    <div class="profile-meta">
                        <span class="profile-meta-item">
                            <svg viewBox="0 0 24 24">
                                <rect x="3" y="4" width="18" height="18" rx="2"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                            Lid geworden: <span id="p-joined"></span>
                        </span>
                    </div>

                    <div class="profile-actions">
                        <button class="btn-outline" onclick="toast('Profiel bewerken komt snel!')">Profiel bewerken</button>
                        <button class="btn-outline" onclick="toast('Link gekopieerd!')">Delen</button>
                    </div>
                </div>

                <div class="profile-stats">
                    <div><span class="profile-stat-n" id="p-posts">0</span><span class="profile-stat-l">Activiteiten</span></div>
                    <div><span class="profile-stat-n">0</span><span class="profile-stat-l">Volgers</span></div>
                    <div><span class="profile-stat-n">0</span><span class="profile-stat-l">Volgend</span></div>
                </div>
            </div>

            <div>
                <div class="section-label">Mijn activiteiten</div>
                <div id="p-posts-list" style="display:flex;flex-direction:column;gap:1rem"></div>
                <div id="p-empty" class="empty" style="display:none">Nog geen activiteiten. Maak er een aan!</div>
            </div>
        </div>
    </main>

    <!-- RIGHT SIDEBAR -->
    <aside class="right-panel">
        <div class="widget">
            <div class="widget-title">Over Mingle</div>
            <div style="font-size:13px;color:var(--muted);line-height:1.7">
                Vind mensen om activiteiten mee te doen in jouw buurt. Maak een activiteit aan en zie wie er aansluit!
            </div>
        </div>

        <div class="widget" style="font-size:12px;color:var(--hint);line-height:1.8">
            <span style="color:var(--muted);font-weight:500;display:block;margin-bottom:4px">Mingle</span>
            Powered by Firebase
        </div>
    </aside>
</div>

<script type="module" src="main.js"></script>

</body>
</html>
