<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Icons/Mingle_Icon.png">
    <title>Mingle</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="blobs"><div class="blob b1"></div><div class="blob b2"></div></div>
<div class="toast" id="toast"></div>

<nav class="nav">
    <span class="nav-brand">Mingle</span>
    <div class="nav-search">
        <span class="nav-search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" placeholder="Search Mingle…">
    </div>
    <div class="nav-actions">
        <button class="nav-icon-btn" onclick="toast('No notifications yet!')"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
        <div class="nav-avatar" id="nav-avatar" onclick="showView('profile')"></div>
    </div>
</nav>

<div class="app-body">
    <aside class="sidebar">
        <button class="sidebar-link active" id="sl-home" onclick="showView('feed')">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
        </button>
        <button class="sidebar-link" id="sl-profile" onclick="showView('profile')">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>My profile
        </button>
        <button class="sidebar-link" onclick="toast('Messages coming soon!')">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Messages
        </button>
        <button class="sidebar-link" onclick="toast('Explore coming soon!')">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>Explore
        </button>
        <div class="sidebar-spacer"></div>
        <button class="sidebar-link danger" onclick="logout()">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign out
        </button>
    </aside>

    <main class="main">
        <!-- Feed -->
        <div class="view active" id="view-feed">
            <div class="compose">
                <div class="compose-inner">
                    <div class="c-avatar" id="compose-av"></div>
                    <div class="compose-right">
                        <textarea id="compose-text" placeholder="What's on your mind?" rows="2"></textarea>
                        <div class="compose-footer"><button class="btn-post" onclick="submitPost()">Post</button></div>
                    </div>
                </div>
            </div>
            <div id="feed-list"></div>
        </div>

        <!-- Profile -->
        <div class="view" id="view-profile">
            <div class="profile-header">
                <div class="profile-cover"><div class="profile-cover-dots"></div></div>
                <div class="profile-info">
                    <div class="profile-av-wrap"><div class="profile-av" id="p-av"></div></div>
                    <div class="profile-name" id="p-name"></div>
                    <div class="profile-handle" id="p-handle"></div>
                    <div class="profile-bio">Hey there! I just joined Mingle 👋</div>
                    <div class="profile-meta">
                        <span class="profile-meta-item"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Joined <span id="p-joined"></span></span>
                    </div>
                    <div class="profile-actions">
                        <button class="btn-outline" onclick="toast('Edit profile coming soon!')">Edit profile</button>
                        <button class="btn-outline" onclick="toast('Link copied!')">Share</button>
                    </div>
                </div>
                <div class="profile-stats">
                    <div><span class="profile-stat-n" id="p-posts">0</span><span class="profile-stat-l">Posts</span></div>
                    <div><span class="profile-stat-n">0</span><span class="profile-stat-l">Followers</span></div>
                    <div><span class="profile-stat-n">0</span><span class="profile-stat-l">Following</span></div>
                </div>
            </div>
            <div>
                <div class="section-label">Posts</div>
                <div id="p-posts-list" style="display:flex;flex-direction:column;gap:1rem"></div>
                <div id="p-empty" class="empty" style="display:none">No posts yet. Go say something!</div>
            </div>
        </div>
    </main>

    <aside class="right-panel">
        <div class="widget">
            <div class="widget-title">Who to follow</div>
            <div class="suggest" id="suggestions"></div>
        </div>
        <div class="widget" style="font-size:12px;color:var(--hint);line-height:1.8">
            <span style="color:var(--muted);font-weight:500;display:block;margin-bottom:4px">Mingle Demo</span>
            Data lives in your browser. Real backend coming soon.
        </div>
    </aside>
</div>
<script type="text/javascript" src="main.js"></script>
</body>
</html>
